# =============================================================================
# BuddyAI Backend Configuration
# =============================================================================

# Application
spring.application.name=companion-backend
server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-stacktrace=on_param

# =============================================================================
# Database Configuration
# =============================================================================

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:buddy_ai_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL15Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================================================
# Logging Configuration
# =============================================================================

logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/app.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# OpenAI Configuration
# =============================================================================

app.llm.api-key=${OPENAI_API_KEY:sk-your-api-key-here}
app.llm.model=gpt-3.5-turbo
app.llm.embedding-model=text-embedding-3-small
app.llm.max-tokens=500
app.llm.timeout=30000

# =============================================================================
# Firebase Configuration
# =============================================================================

firebase.config.path=${FIREBASE_CONFIG_PATH:firebase-config.json}
firebase.database-url=${FIREBASE_DB_URL:https://your-project.firebaseio.com}

# =============================================================================
# Memory Service Configuration
# =============================================================================

app.memory.similarity-threshold=0.7
app.memory.top-k=5
app.memory.embedding-batch-size=100

# =============================================================================
# Scheduler Configuration
# =============================================================================

app.scheduler.reminder-check-interval=300000
app.scheduler.daily-summary-time=08:00
app.scheduler.enabled=true

# =============================================================================
# Application Settings
# =============================================================================

app.environment=${APP_ENV:development}
app.debug=${APP_DEBUG:true}
app.api.version=1.0.0
