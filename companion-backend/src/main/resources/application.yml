server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/companion_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  llm:
    api-key: ${OPENAI_API_KEY:your-key-here}
  firebase:
    service-account-path: ${FIREBASE_KEY_PATH:classpath:firebase-service-account.json}
